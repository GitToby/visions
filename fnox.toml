default_provider = "op"

# op signin -f | source
[providers.op]
type = "1password"

# to sync locally
# fnox sync --provider age --config fnox.local.toml
[providers.age]
type = "age"
recipients = [
    "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKLE8eU9iSeObEwuJFlW5+5gzE7Km6YDymjP2gaRmEpD"
]

[secrets]
DATABASE_PASSWORD  = { provider = "op", value = "op://Employee/VISIONS App Secrets/Prod/database_password" }
SUPABASE_SECRET_KEY = { provider = "op", value = "op://Employee/VISIONS App Secrets/Prod/supabase_secret_key" }
S3_SECRET_ACCESS_KEY = { provider = "op", value = "op://Employee/VISIONS App Secrets/Prod/s3_secret_access_key"}
GEMINI_API_KEY = { provider = "op", value = "op://Employee/VISIONS App Secrets/Prod/gemini_api_key" }
