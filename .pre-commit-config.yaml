repos:
  - repo: local
    hooks:
      - id: backend-check
        name: backend typecheck
        entry: just backend::check
        language: system
        types: [python]
        pass_filenames: false

      - id: frontend-lint
        name: frontend lint
        entry: just frontend::check
        language: system
        files: ^frontend/src/
        pass_filenames: false

      - id: frontend-oapi
        name: frontend generate api
        entry: just frontend::gen-api
        language: system
        files: ^frontend/src/
        pass_filenames: false
