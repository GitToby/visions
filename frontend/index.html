<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Primary meta -->
    <title>Visions – AI Interior Design Reimaginer</title>
    <meta name="description" content="Upload a photo of any room, pick a design style, and get an AI-generated vision of what it could look like. Japandi, industrial, mid-century, coastal and more." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://visions.design/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://visions.design/" />
    <meta property="og:title" content="Visions – AI Interior Design Reimaginer" />
    <meta property="og:description" content="Upload a photo of any room, pick a design style, and get an AI-generated vision of what it could look like." />
    <meta property="og:image" content="https://visions.design/img/example-dining-room-japandi.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="800" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Visions – AI Interior Design Reimaginer" />
    <meta name="twitter:description" content="Upload a photo of any room, pick a design style, and get AI-generated results in seconds." />
    <meta name="twitter:image" content="https://visions.design/img/example-dining-room-japandi.webp" />

    <!-- Preload hero images for LCP -->
    <link rel="preload" as="image" href="/img/example-dining-room.webp" />
    <link rel="preload" as="image" href="/img/example-dining-room-japandi.webp" />

    <!-- Structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Visions",
      "description": "AI-powered interior design reimaginer. Upload room photos and see them transformed into curated design styles.",
      "url": "https://visions.design/",
      "applicationCategory": "DesignApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
