# yaml-language-server: $schema=https://render.com/schema/render.yaml.json
# https://render.com/docs/blueprint-spec

services:
  # FastAPI backend
  - type: web
    name: visions-api
    rootDir: backend
    runtime: python
    region: frankfurt
    plan: free
    
    # uv is already installed in render:
    # https://render.com/docs/deploys#build-command
    buildCommand: uv sync
    # preDeployCommand: uv run alembic upgrade head # needs a paid plan
    startCommand: uv run uvicorn visions.main:app --host 0.0.0.0 --port 80
    healthCheckPath: /health
    domains:
      - api.visions.tobydevlin.com
    buildFilter:
      paths:
        - backend/**
    envVars:
      - key: DATABASE_PASSWORD
        sync: false
      - key: SUPABASE_SECRET_KEY
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  # React + Vite frontend (static site)
  - type: web
    name: visions-web
    rootDir: frontend
    runtime: static
    domains:
      - api.visions.tobydevlin.com
    
    # bun is already installed in render:
    # https://render.com/docs/deploys#build-command
    buildCommand: bun install && bun run build
    
    buildFilter:
      paths:
        - frontend/**
    envVars:
      - key: VITE_SUPABASE_URL
        value: https://sutnrwodqzpfvuuboksu.supabase.co
      - key: VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY
        sync: false
      - key: VITE_API_BASE_URL
        sync: false
