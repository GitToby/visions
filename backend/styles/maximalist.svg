<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 270" width="400" height="270">
  <defs>
    <pattern id="damask" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <rect width="40" height="40" fill="#4A1B7A"/>
      <circle cx="20" cy="20" r="8" fill="none" stroke="#6B2E9E" stroke-width="1.5"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#6B2E9E" stroke-width="1"/>
      <circle cx="40" cy="0" r="5" fill="none" stroke="#6B2E9E" stroke-width="1"/>
      <circle cx="0" cy="40" r="5" fill="none" stroke="#6B2E9E" stroke-width="1"/>
      <circle cx="40" cy="40" r="5" fill="none" stroke="#6B2E9E" stroke-width="1"/>
      <line x1="20" y1="12" x2="20" y2="28" stroke="#6B2E9E" stroke-width="1"/>
      <line x1="12" y1="20" x2="28" y2="20" stroke="#6B2E9E" stroke-width="1"/>
    </pattern>
    <linearGradient id="overlay" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C49A2A" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0E5E3A" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Patterned wall -->
  <rect width="400" height="270" fill="url(#damask)"/>
  <rect width="400" height="270" fill="url(#overlay)"/>
  <!-- Rich floor -->
  <rect x="0" y="195" width="400" height="75" fill="#2A1A0A" opacity="0.7"/>
  <line x1="0" y1="195" x2="400" y2="195" stroke="#C49A2A" stroke-width="2"/>
  <!-- Gold frame art piece -->
  <rect x="140" y="35" width="120" height="130" fill="#0E5E3A" rx="2"/>
  <rect x="140" y="35" width="120" height="130" fill="none" stroke="#C49A2A" stroke-width="6" rx="2"/>
  <!-- Abstract art inside frame -->
  <ellipse cx="200" cy="100" rx="35" ry="45" fill="#C49A2A" opacity="0.5"/>
  <ellipse cx="185" cy="90" rx="20" ry="30" fill="#7B1FA2" opacity="0.5"/>
  <ellipse cx="215" cy="110" rx="18" ry="25" fill="#1A6B4A" opacity="0.6"/>
  <!-- Ornate side table -->
  <rect x="55" y="150" width="60" height="10" fill="#C49A2A" opacity="0.8" rx="2"/>
  <line x1="65" y1="160" x2="60" y2="195" stroke="#C49A2A" stroke-width="3"/>
  <line x1="105" y1="160" x2="110" y2="195" stroke="#C49A2A" stroke-width="3"/>
  <ellipse cx="85" cy="142" rx="22" ry="12" fill="#7B1FA2" opacity="0.7"/>
  <!-- Scatter cushions suggestion -->
  <ellipse cx="300" cy="175" rx="35" ry="18" fill="#C49A2A" opacity="0.5"/>
  <ellipse cx="290" cy="168" rx="28" ry="14" fill="#7B1FA2" opacity="0.6"/>
  <ellipse cx="315" cy="170" rx="24" ry="12" fill="#0E5E3A" opacity="0.6"/>
  <!-- Label -->
  <rect x="0" y="230" width="400" height="40" fill="#C49A2A" opacity="0.9"/>
  <text x="200" y="252" font-family="Georgia, serif" font-size="15" font-weight="700" fill="#4A1B7A" text-anchor="middle" letter-spacing="4">MAXIMALIST</text>
</svg>
