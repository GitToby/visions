<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 270" width="400" height="270">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDE8DF"/>
      <stop offset="100%" stop-color="#DDD5C8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="270" fill="url(#bg)"/>
  <!-- Floor line -->
  <rect x="0" y="200" width="400" height="70" fill="#C9BFB3"/>
  <!-- Wall panel left -->
  <rect x="30" y="40" width="8" height="160" fill="#B8AFA5" opacity="0.5"/>
  <!-- Wall panel right -->
  <rect x="362" y="40" width="8" height="160" fill="#B8AFA5" opacity="0.5"/>
  <!-- Horizontal accent line -->
  <line x1="0" y1="160" x2="400" y2="160" stroke="#B8AFA5" stroke-width="1.5"/>
  <!-- Thin shelf -->
  <rect x="80" y="100" width="240" height="6" fill="#9C7E6A" rx="1"/>
  <!-- Minimal vase -->
  <ellipse cx="200" cy="160" rx="16" ry="6" fill="#9C7E6A" opacity="0.6"/>
  <rect x="193" y="106" width="14" height="54" fill="#9C7E6A" rx="7" opacity="0.6"/>
  <!-- Small pebble shapes -->
  <ellipse cx="130" cy="197" rx="22" ry="8" fill="#B8AFA5" opacity="0.4"/>
  <ellipse cx="270" cy="195" rx="18" ry="7" fill="#B8AFA5" opacity="0.4"/>
  <!-- Label -->
  <rect x="0" y="230" width="400" height="40" fill="#3C2F26" opacity="0.75"/>
  <text x="200" y="252" font-family="Georgia, serif" font-size="16" font-weight="400" fill="#EDE8DF" text-anchor="middle" letter-spacing="4">JAPANDI</text>
</svg>
