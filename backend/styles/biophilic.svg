<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 270" width="400" height="270">
  <defs>
    <linearGradient id="wall-bio" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F0E0"/>
      <stop offset="100%" stop-color="#D4E6C8"/>
    </linearGradient>
    <linearGradient id="floor-bio" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6331"/>
      <stop offset="100%" stop-color="#A67C52"/>
    </linearGradient>
  </defs>
  <!-- Wall -->
  <rect width="400" height="270" fill="url(#wall-bio)"/>
  <!-- Wood floor -->
  <rect x="0" y="198" width="400" height="72" fill="url(#floor-bio)"/>
  <line x1="0" y1="198" x2="400" y2="198" stroke="#6B4C22" stroke-width="1.5"/>
  <!-- Wood planks -->
  <line x1="0" y1="218" x2="400" y2="218" stroke="#6B4C22" stroke-width="0.8" opacity="0.4"/>
  <line x1="0" y1="238" x2="400" y2="238" stroke="#6B4C22" stroke-width="0.8" opacity="0.4"/>
  <line x1="0" y1="258" x2="400" y2="258" stroke="#6B4C22" stroke-width="0.8" opacity="0.4"/>
  <!-- Living wall panel -->
  <rect x="240" y="20" width="130" height="175" fill="#2D6A30" rx="3"/>
  <!-- Leaf clusters on living wall -->
  <ellipse cx="270" cy="55" rx="18" ry="22" fill="#3A8C3E" opacity="0.8" transform="rotate(-20 270 55)"/>
  <ellipse cx="295" cy="45" rx="15" ry="20" fill="#5EA861" opacity="0.8" transform="rotate(10 295 45)"/>
  <ellipse cx="320" cy="55" rx="17" ry="21" fill="#2D6A30" opacity="0.9" transform="rotate(-10 320 55)"/>
  <ellipse cx="260" cy="90" rx="16" ry="20" fill="#5EA861" opacity="0.7" transform="rotate(15 260 90)"/>
  <ellipse cx="290" cy="85" rx="18" ry="23" fill="#3A8C3E" opacity="0.8" transform="rotate(-5 290 85)"/>
  <ellipse cx="355" cy="85" rx="14" ry="19" fill="#5EA861" opacity="0.7" transform="rotate(20 355 85)"/>
  <ellipse cx="270" cy="125" rx="17" ry="21" fill="#2D6A30" opacity="0.9" transform="rotate(-15 270 125)"/>
  <ellipse cx="305" cy="120" rx="15" ry="20" fill="#5EA861" opacity="0.8" transform="rotate(8 305 120)"/>
  <ellipse cx="340" cy="130" rx="16" ry="22" fill="#3A8C3E" opacity="0.7" transform="rotate(-12 340 130)"/>
  <ellipse cx="260" cy="162" rx="18" ry="20" fill="#5EA861" opacity="0.8" transform="rotate(5 260 162)"/>
  <ellipse cx="295" cy="158" rx="16" ry="21" fill="#2D6A30" opacity="0.9" transform="rotate(-20 295 158)"/>
  <ellipse cx="355" cy="155" rx="14" ry="18" fill="#3A8C3E" opacity="0.7" transform="rotate(15 355 155)"/>
  <!-- Large potted plant left -->
  <ellipse cx="80" cy="198" rx="30" ry="10" fill="#5C3D1A" opacity="0.6"/>
  <rect x="65" y="172" width="30" height="26" fill="#7A5229" rx="2"/>
  <!-- Plant stems -->
  <path d="M80,170 Q60,140 45,110" stroke="#2D6A30" stroke-width="3" fill="none"/>
  <path d="M80,170 Q90,135 75,100" stroke="#2D6A30" stroke-width="3" fill="none"/>
  <path d="M80,170 Q110,140 120,110" stroke="#3A8C3E" stroke-width="3" fill="none"/>
  <!-- Leaves on stems -->
  <ellipse cx="45" cy="108" rx="18" ry="12" fill="#4AA64E" opacity="0.9" transform="rotate(-40 45 108)"/>
  <ellipse cx="74" cy="98" rx="16" ry="11" fill="#5EA861" opacity="0.9" transform="rotate(10 74 98)"/>
  <ellipse cx="120" cy="108" rx="17" ry="12" fill="#3A8C3E" opacity="0.9" transform="rotate(40 120 108)"/>
  <!-- Stone feature -->
  <ellipse cx="190" cy="196" rx="45" ry="12" fill="#9E9E9E" opacity="0.3"/>
  <!-- Label -->
  <rect x="0" y="230" width="400" height="40" fill="#1A4D1E" opacity="0.85"/>
  <text x="200" y="252" font-family="Georgia, serif" font-size="16" font-weight="400" fill="#D4E6C8" text-anchor="middle" letter-spacing="4">BIOPHILIC</text>
</svg>
