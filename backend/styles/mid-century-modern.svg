<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 270" width="400" height="270">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5ECD7"/>
      <stop offset="100%" stop-color="#EAD9BE"/>
    </linearGradient>
  </defs>
  <!-- Wall -->
  <rect width="400" height="270" fill="url(#wall)"/>
  <!-- Floor -->
  <rect x="0" y="200" width="400" height="70" fill="#C49A6C" opacity="0.4"/>
  <line x1="0" y1="200" x2="400" y2="200" stroke="#C49A6C" stroke-width="2"/>
  <!-- Sunburst clock -->
  <circle cx="310" cy="90" r="30" fill="#D4A017"/>
  <circle cx="310" cy="90" r="18" fill="#F5ECD7"/>
  <circle cx="310" cy="90" r="4" fill="#D4A017"/>
  <!-- Sunburst rays -->
  <g stroke="#D4A017" stroke-width="3">
    <line x1="310" y1="55" x2="310" y2="48"/>
    <line x1="310" y1="125" x2="310" y2="132"/>
    <line x1="275" y1="90" x2="268" y2="90"/>
    <line x1="345" y1="90" x2="352" y2="90"/>
    <line x1="285" y1="65" x2="280" y2="60"/>
    <line x1="335" y1="115" x2="340" y2="120"/>
    <line x1="335" y1="65" x2="340" y2="60"/>
    <line x1="285" y1="115" x2="280" y2="120"/>
  </g>
  <!-- Eames-style chair -->
  <!-- Seat -->
  <ellipse cx="120" cy="165" rx="38" ry="14" fill="#2E7C8A"/>
  <!-- Back -->
  <ellipse cx="120" cy="130" rx="30" ry="22" fill="#2E7C8A"/>
  <!-- Tapered legs -->
  <line x1="92" y1="175" x2="82" y2="205" stroke="#7B4F2E" stroke-width="5" stroke-linecap="round"/>
  <line x1="148" y1="175" x2="158" y2="205" stroke="#7B4F2E" stroke-width="5" stroke-linecap="round"/>
  <line x1="100" y1="172" x2="94" y2="200" stroke="#7B4F2E" stroke-width="4" stroke-linecap="round"/>
  <line x1="140" y1="172" x2="146" y2="200" stroke="#7B4F2E" stroke-width="4" stroke-linecap="round"/>
  <!-- Geometric accent shape -->
  <polygon points="220,80 260,150 180,150" fill="#D4A017" opacity="0.3"/>
  <polygon points="230,95 255,140 205,140" fill="#B5501B" opacity="0.2"/>
  <!-- Label -->
  <rect x="0" y="230" width="400" height="40" fill="#2E3A2F" opacity="0.8"/>
  <text x="200" y="252" font-family="Georgia, serif" font-size="12" font-weight="400" fill="#F5ECD7" text-anchor="middle" letter-spacing="3">MID-CENTURY MODERN</text>
</svg>
